<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="林致远的学习笔记 - 课程总结、技术笔记、论文阅读">
<meta property="og:title" content="学习笔记 - Lin Zhiyuan">
<meta property="og:description" content="课程总结与技术学习笔记">
<meta property="og:type" content="website">
<title>学习笔记 - Lin Zhiyuan</title>
<link rel="icon" href="../../favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="../../assets/global.css">
<style>
.note-list { display: flex; flex-direction: column; gap: 12px; max-width: 800px; margin: 0 auto; }
.note-card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-md);
  padding: 22px 24px;
  transition: var(--transition-fast);
  cursor: pointer;
}
.note-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-card);
  border-color: var(--border-card-hover);
}
.note-card .tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 6px;
  background: rgba(0,113,227,0.08);
  color: var(--accent-1);
  font-weight: 600;
  margin-bottom: 8px;
}
.note-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.note-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.note-card .meta { font-size: 12px; color: var(--text-muted); margin-top: 10px; }
</style>
</head>
<body>
<div class="page-container">
  <a class="back-home" href="../../">← 返回首页</a>
  <header class="page-header">
    <div style="text-align:center;margin-bottom:20px">
      <img src="../../assets/images/cute-avatar.png" alt="" style="width:80px;height:80px;border-radius:20px;object-fit:cover;display:inline-block;box-shadow:0 4px 20px rgba(0,0,0,0.08)">
    </div>
    <h1>📝 学习笔记</h1>
    <p>课程总结 · 技术笔记 · 论文阅读</p>
  </header>
  <div class="note-list" id="noteList">
    <div style="text-align:center;padding:40px;color:var(--text-muted)">加载中…</div>
  </div>
  <footer class="page-footer"><p>&copy; 2026 Lin Zhiyuan · Notes · 编辑 data.json 管理</p></footer>
</div>
<script>
(function(){
  fetch('data.json').then(function(r){return r.json()}).then(function(d){
    var el = document.getElementById('noteList');
    if (!d.notes || !d.notes.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">暂无笔记</div>'; return; }
    var html = '';
    d.notes.forEach(function(n){
      html += '<div class="note-card"><div class="tag">' + n.category + '</div><h3>' + n.title + '</h3><p>' + n.summary + '</p><div class="meta">📅 ' + n.date + '</div></div>';
    });
    el.innerHTML = html;
  }).catch(function(){ document.getElementById('noteList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">加载失败</div>'; });
})();
</script>
</body>
</html>
