<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="林致远的作品展示 - 项目截图、设计稿、数据可视化">
<meta property="og:title" content="作品展示 - JokeLin">
<meta property="og:description" content="项目与创意作品展示">
<meta property="og:type" content="website">
<title>作品展示 - JokeLin</title>
<link rel="icon" href="../../favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="../../assets/global.css">
<style>
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  max-width: 960px;
  margin: 0 auto;
}
.gallery-card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition-fast);
  cursor: pointer;
}
.gallery-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
  border-color: var(--border-card-hover);
}
.gallery-card__preview {
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  overflow: hidden;
  position: relative;
}
.gallery-card__preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}
.gallery-card:hover .gallery-card__preview img {
  transform: scale(1.05);
}
.gallery-card__body {
  padding: 18px 20px;
}
.gallery-card__body h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.gallery-card__body p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.gallery-card__body .tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 6px;
  background: rgba(0,113,227,0.08);
  color: var(--accent-1);
  font-weight: 600;
  margin-top: 8px;
}
/* 轻量预览弹窗 */
.preview-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.preview-overlay.show { display: flex; }
.preview-overlay img {
  max-width: 85vw;
  max-height: 85vh;
  border-radius: 20px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.3);
  object-fit: contain;
}
.preview-overlay .close {
  position: fixed; top: 24px; right: 24px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  color: #fff;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}
.preview-overlay .close:hover {
  background: rgba(0,0,0,0.6);
  transform: scale(1.1);
}
@media (max-width: 768px) {
  .gallery-card__preview { height: 140px; }
}
</style>
</head>
<body>
<div class="page-container">
  <a class="back-home" href="../../">← 返回首页</a>
  <header class="page-header">
    <h1>🎨 作品展示</h1>
    <p>项目截图 · 数据可视化 · 创意设计 · 新上传可爱头像展示</p>
  </header>
  <div class="gallery-grid" id="galleryGrid">
    <div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1">加载中…</div>
  </div>
  <footer class="page-footer"><p>&copy; 2026 JokeLin · Gallery · 编辑 data.json 管理</p></footer>
</div>

<!-- 预览弹窗 -->
<div class="preview-overlay" id="previewOverlay">
  <div class="close" id="previewClose">✕</div>
  <img id="previewImage" src="" alt="预览">
</div>

<script>
(function(){
  fetch('data.json').then(function(r){return r.json()}).then(function(d){
    var el = document.getElementById('galleryGrid');
    if (!d.items || !d.items.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1">暂无作品</div>'; return; }
    var html = '';
    d.items.forEach(function(item){
      var preview = item.image ? '<img src="../../' + item.image + '" alt="' + item.title + '">' : item.icon;
      html += '<div class="gallery-card" data-image="' + (item.image || '') + '"><div class="gallery-card__preview" style="background:' + (item.bg || 'linear-gradient(135deg,#f0f0f0,#e8e8e8)') + '">' + preview + '</div><div class="gallery-card__body"><h3>' + item.title + '</h3><p>' + item.desc + '</p><div class="tag">' + item.category + '</div></div></div>';
    });
    el.innerHTML = html;

    /* 点击预览 */
    var overlay = document.getElementById('previewOverlay');
    var previewImg = document.getElementById('previewImage');
    var closeBtn = document.getElementById('previewClose');
    el.querySelectorAll('.gallery-card').forEach(function(card){
      card.addEventListener('click', function(){
        var src = this.getAttribute('data-image');
        if (src) {
          previewImg.src = '../../' + src;
          overlay.classList.add('show');
        }
      });
    });
    closeBtn.onclick = function(){ overlay.classList.remove('show'); };
    overlay.onclick = function(e){ if (e.target === overlay) overlay.classList.remove('show'); };
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') overlay.classList.remove('show'); });
  }).catch(function(){ document.getElementById('galleryGrid').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1">加载失败</div>'; });
})();
</script>
</body>
</html>
