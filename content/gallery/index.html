<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="林致远的作品展示 - 项目截图、设计稿、数据可视化">
<meta property="og:title" content="作品展示 - JokeLin">
<meta property="og:description" content="项目与创意作品展示">
<meta property="og:type" content="website">
<title>作品展示 - JokeLin</title>
<link rel="icon" href="../../favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="../../assets/global.css">
<style>
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  max-width: 960px;
  margin: 0 auto;
}
.gallery-card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition-fast);
  cursor: default;
}
.gallery-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
  border-color: var(--border-card-hover);
}
.gallery-card__preview {
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}
.gallery-card__body {
  padding: 18px 20px;
}
.gallery-card__body h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.gallery-card__body p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.gallery-card__body .tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 6px;
  background: rgba(0,113,227,0.08);
  color: var(--accent-1);
  font-weight: 600;
  margin-top: 8px;
}
</style>
</head>
<body>
<div class="page-container">
  <a class="back-home" href="../../">← 返回首页</a>
  <header class="page-header">
    <h1>🎨 作品展示</h1>
    <p>项目截图 · 数据可视化 · 创意设计</p>
  </header>
  <div class="gallery-grid" id="galleryGrid">
    <div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1">加载中…</div>
  </div>
  <footer class="page-footer"><p>&copy; 2026 JokeLin · Gallery · 编辑 data.json 管理</p></footer>
</div>
<script>
(function(){
  fetch('data.json').then(function(r){return r.json()}).then(function(d){
    var el = document.getElementById('galleryGrid');
    if (!d.items || !d.items.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1">暂无作品</div>'; return; }
    var html = '';
    d.items.forEach(function(item){
      html += '<div class="gallery-card"><div class="gallery-card__preview" style="background:' + (item.bg || 'linear-gradient(135deg,#f0f0f0,#e8e8e8)') + '">' + item.icon + '</div><div class="gallery-card__body"><h3>' + item.title + '</h3><p>' + item.desc + '</p><div class="tag">' + item.category + '</div></div></div>';
    });
    el.innerHTML = html;
  }).catch(function(){ document.getElementById('galleryGrid').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1">加载失败</div>'; });
})();
</script>
</body>
</html>
